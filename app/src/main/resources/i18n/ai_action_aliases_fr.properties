# AI action alias keys — French
#
# Guide de lecture pour la traduction vocale FR:
# INFO = demande d'information, réponse vocale seulement ou analyse de données.
# ACTION_JEU = interaction avec Elite Dangerous via raccourcis, panneaux, navigation ou saisie.
# ACTION_RECHERCHE = recherche externe/interne pouvant ensuite préparer une route, un rappel ou une action.
# ACTION_APP = réglage interne d'Elite Intel, écoute, voix, annonces, rappels, préférences.
# DANGEREUX = annulation, suppression ou effacement; garder des phrases explicites.
#
# Règle de style:
# - Les formulations INFO/RECHERCHE doivent sonner comme des demandes: "trouve", "cherche", "rapport", "statut",
#   "information", "détails", "compte rendu", "propose", "étudie".
# - Les formulations ACTION doivent sonner comme des ordres: "ouvre", "active", "désactive", "navigue", "trace",
#   "cible", "sélectionne", "verrouille", "établis", "fais", "définis", "règle".
# - "Itinéraire" est neutre: INFO avec "rapport/statut/combien/où", ACTION avec "trace/navigue/établis/définis".
# - "Porte-vaisseau" seul = fleet-carrier personnel; "escadron" ou "squadron carrier" = porte-vaisseau d'escadron.
# - Éviter les formulations ambiguës dans les actions qui font plus que répondre.

# =============================================================================
# BLOC 01 — ÉCOUTE, VEILLE ET INTERRUPTION
# Type: ACTION_APP
# Rôle: contrôler l'état d'écoute et interrompre la voix, sans interaction directe avec le jeu.
# =============================================================================
