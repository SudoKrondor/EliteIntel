sleep=désactive les commandes vocales, passe en mode veille, mise en veille, mode veille, tu peux disposer, désactivation commande vocale, desactivation commande vocale, desactive les commandes vocales, dors, dormir, endors-toi
interrupt=interromps, interruption, arrête de parler, arrete de parler, coupe la voix, stop voix, silence, tais-toi

